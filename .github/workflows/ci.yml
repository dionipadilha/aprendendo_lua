name: CI

on:
  push:
  pull_request:

jobs:
  teste-de-fumaca:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Lua 5.4
        run: sudo apt-get update && sudo apt-get install -y lua5.4

      - name: Executar todos os exemplos
        run: ./executar_testes.sh

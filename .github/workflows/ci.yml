name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  teste-de-fumaca:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Lua 5.4 e luacheck
        run: sudo apt-get update && sudo apt-get install -y lua5.4 lua-check

      - name: Executar todos os exemplos
        run: ./executar_testes.sh

      - name: Análise estática (luacheck)
        run: luacheck . -q

      # Valida o rockspec real do repositório: instala o pluralizador
      # com luarocks make e o utiliza de fora da pasta do projeto
      # (o ciclo completo está documentado em modulos/empacotamento.md).
      - name: Empacotar e instalar o pluralizador (LuaRocks)
        run: |
          sudo apt-get install -y luarocks liblua5.4-dev
          cd projetos/pluralizador
          luarocks --lua-version=5.4 make --local pluralizador-1.0-1.rockspec
          eval "$(luarocks --lua-version=5.4 path)"
          cd /tmp
          lua5.4 -e 'local plural = require "pluralizador"
            assert(plural("child") == "children")
            assert(plural("box") == "boxes")
            print("rock pluralizador instalada e verificada")'

  # Valida a portabilidade dos exemplos (o repositório mantém um guia de
  # instalação para Windows; ver sistema/dormir.lua para as esperas).
  teste-de-fumaca-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # gh-actions-lua compila o Lua com o MSVC; este passo põe o cl.exe no PATH.
      - name: Preparar o toolchain MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Instalar Lua 5.4
        uses: leafo/gh-actions-lua@v11
        with:
          luaVersion: "5.4"

      - name: Executar todos os exemplos
        shell: bash
        run: LUA=lua ./executar_testes.sh

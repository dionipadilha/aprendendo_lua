# Basics for Lua Programming Language
Comments:
  - Single line comments # -- Single line comments
  - Multi-line comments # --[[ Multi-line comments --]]
  - Expected output comments # print(fruits[1]) --> apple
Variables:
  - Variable scope # global, local
  - Variable declaration # local variableName
  - Variable assignment # local variableName = value
Data Types:
  - Strings # "Hello Lua!"
  - Numbers # 3.14
  - Booleans # true or false
  - Tables # fruits = {"apple", ...}, person = {name = "John Doe", ...}
  - Nil # local x, print(x) --> nil
  - Functions # local function myFunction() end
Operators:
  - Arithmetic operators:
      - Addition # 5 + 2 --> 7
      - Subtraction # 5 - 2 --> 3
      - Multiplication # 5 * 2 --> 10
      - Division # 5/2 --> 2.5
      - Floor Division # 5//2 --> 2
      - Modulo # 5%2 --> 1
      - Exponentiation # 2^3 --> 8
  - Relational operators:
      - Equality # 5 == 2 --> false
      - Inequality # 5 ~= 2 --> true
      - Less than # 5 < 2 --> false
      - Greater than # 5 > 2 --> true
      - Less than or equal to # 5 <= 2 --> false
      - Greater than or equal to # 5 >= 2 --> true
  - Logical operators:
      - And # true and false --> false
      - Or # true or false --> true
      - Not # not true --> false
  - Bitwise operators:
      - Bitwise AND # 5 & 2 --> 0 (0000 0101 & 0000 0010 = 0000 0000)
      - Bitwise OR # 5 | 2 --> 7 (0000 0101 | 0000 0010 = 0000 0111)
      - Bitwise XOR # 5 ~ 2 --> 7 (0000 0101 ~ 0000 0010 = 0000 0111)
      - Bitwise NOT # ~5 --> -6 (0000 0101 = 1111 1010)
      - Bitwise Left Shift # 5 << 2 --> 20 (0000 0101 << 2 = 0001 0100)
      - Bitwise Right Shift # 5 >> 2 --> 1 (0000 0101 >> 2 = 0000 0001)
  - Concatenation operator # "Hello" .. " " .. "Lua!" --> "Hello Lua!"
  - Length operator # #fruits --> 3
Conditional statements:
  - if # if condition then statements end
  - elseif # elseif condition then statements end
  - else # else statements end
Looping statements:
  - while # while condition do statements end
  - repeat...until # repeat statements until condition
  - for range # for variable = start, end, step do statements end
  - for each # for key, value in pairs(table) do statements end
  - break # break (continue N/A)
Functions:
  - Definition # local function myFunction(parameters) statements end
  - Call # local x = myFunction(arg)
  - Default parameter values # myFunction(param = value)
  - Variable number of parameters # myFunction(...)
  - Return values # return value
  - Return multiple values # return value1, value2
  - Conditional return with ternary operator # return a and b or c
Tables as Arrays:
  - Create an empty array # local array = {}
  - Create an array with elements # local fruits = {"apple", "banana", "cherry"}
  - Number of elements # print(#fruits) --> 3
  - Access elements # print(fruits[1]) --> apple
  - Accessing elements outside the range # --> nil
  - Looping through elements # for _, fruit in ipairs(fruits) do something(fruit) end
  - Modifying elements by index # fruits[3] = "chocolate"
  - Adding new elements # fruits:insert("orange")
  - Adding new elements by index # fruits:insert("mango", 3)
  
Tables as Dictionar:
  - Create an map # local person = {name = "John Doe", age = 30}

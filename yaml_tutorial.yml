Introduction to YAML:
  Meta:
    title: Introduction to YAML
    page_count: 1
    is_published: false
    date: 2024-02-05

  Table of contents:
    - Introduction
    - Key Points
    - Basic Types
    - Structures
    - Extra YAML Features
    - Additional Resources

  Introduction: |
    This YAML document covers the fundamental aspects of YAML, providing a solid
    introduction for those new to the language. It also touches on advanced
    features like multiple-line strings, anchors, and aliases.

  Key Points:
    - Human-readable data serialization format.
    - Commonly used for configuration files and data exchange.
    - YAML files use indentation and colons to represent data structures.

  Basic Types:
    Strings: plain text

    Numbers:
      integer: 3
      float: 3.14
      hexadecimal: 0xff
      scientific: 1e+12
      complex: 1+2i

    Timestamps: # timestamp format follows the ISO 8601 standard
      date: 2024-02-05
      time: 16:32:48
      datetime: 2001-12-15T02:59:43.1Z

    Booleans:
      is_condition: true # true/false
      is_ok: yes # yes/no
      is_state: on # on/off

    Nulls:
      null_value: null
      another_null_value: ~
      undefined: undefined

  Structures: # inline notations
    List: # [item, item]
      - item
      - item

    Nested_lists: # [[sublist, item, item],[sublist, item, item]]
      - - sublist
        - item
        - item
      - - sublist
        - item
        - item

    Map: # { key_1: value_1, key_2: value_2 }
      key_1: value_1
      key_2: value_2

    Nested_maps:
      key: value
      another_key: another_value
      nested_map:
        nested_key: nested_value

    Object: # { name: John Doe, age: 30, hobbies: [reading, hiking] }
      name: John Doe
      age: 30
      hobbies:
        - reading
        - hiking

  Extra YAML Features:
    Comments:
      # This is a line comment
      key: value # This is a side comment

    Anchors and Aliases: # Can be used to duplicate/inherit properties
      - &alias "1px solid red"
      - style_1: *alias
      - style_2: *alias

    Merge Keys: # NOTE: If key already exists alias will not be merged
      base: &base
        name: John Doe
      student_1:
        <<: *base # doesn't merge the anchor
        age: 10
      student_2:
        <<: *base # base anchor will be merged
        age: 20

    Tags: # used to explicitly declare types
      - python_complex_number: !!python/complex 1+2j
      - python_tupple: !!python/tuple [5, 7]

    Multiple Line Strings:
      literal_block: |
        Entire block of text exactly as writte.
        Including the new lines.

      folded_block: >
        Entire block of text exactly as writte.
        But new lines become spaces.

      block_strip: >-
        This entire block of text will be the value of 'folded_style',
        but this time,
        all newlines will be replaced with a single space
        and trailing blank line being stripped.

  YAML Best Practices:
    Consistent Indentation:
      - Always use spaces for indentation, not tabs.
      - Consistent indentation level, typically two spaces.

    Managing Line Lengths:
      - Wrap lines at 80-100 characters for better readability.
      - Use folded style (>) for long strings to maintain readability.

    Effective Use of Comments:
      - Use comments to explain complex configurations or choices.
      - Avoid redundant comments, focus on adding value.
      - Place comments on a separate line above the code they describe.

    Key Value Practices:
      - Quote strings only when necessary.
      - Choose keys that clearly describe their associated values.

    Structure and Organization:
      - Group related data together.
      - Use anchors and aliases for repeated nodes to keep YAML DRY.

    Handling Complex Structures:
      - Consider breaking large YAML files into smaller, manageable ones.
      - Use nested structures for organization but avoid excessive nesting.

    Validation and Linting:
      - Use a YAML validator to check syntax errors.
      - Use a linter to enforce style consistency.

    Aditional Resources:
      - yalm validator: [https://www.yamllint.com/]
      - Based on: [https://learnxinyminutes.com/docs/yaml/]
